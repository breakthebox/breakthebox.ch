# ═══════════════════════════════════════════════════════════
# Docker Compose — Production Deployment (Traefik)
# ═══════════════════════════════════════════════════════════
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml down
#   docker compose -f docker-compose.prod.yml logs -f app

services:
  # ─── PostgreSQL Database ───
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-breakthebox}
      POSTGRES_USER: ${DB_USER:-breakthebox}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-breakthebox}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── SvelteKit Application ───
  app:
    image: ghcr.io/breakthebox/breakthebox.ch:${APP_VERSION:-latest}
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-breakthebox}:${DB_PASSWORD}@db:5432/${DB_NAME:-breakthebox}
      - NODE_ENV=production
      - ORIGIN=${PUBLIC_APP_URL:-https://web.breakthebox.ch}
      # adapter-node begrenzt Request-Bodies auf 512 KB — hochgesetzt, damit
      # Bild-Uploads bis zur App-Grenze (5 MB, /api/upload) durchkommen.
      - BODY_SIZE_LIMIT=6M
    env_file:
      - .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - n8n_internal
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.breakthebox.rule=Host(`web.breakthebox.ch`)'
      - 'traefik.http.routers.breakthebox.entrypoints=websecure'
      - 'traefik.http.routers.breakthebox.tls=true'
      - 'traefik.http.routers.breakthebox.tls.certresolver=myresolver'
      - 'traefik.http.routers.breakthebox.tls.domains[0].main=web.breakthebox.ch'
      - 'traefik.http.services.breakthebox.loadbalancer.server.port=3000'
      - 'traefik.docker.network=n8n_internal'
      # ─── Redirect: www.brigittehulliger.ch → web.breakthebox.ch (301) ───
      # Eigener Router mit TLS-Zertifikat; die Middleware leitet um, bevor die
      # Anfrage die App erreicht (service=breakthebox nur, weil Traefik einen
      # Service verlangt). $$ escaped das $ vor Compose-Interpolation.
      - 'traefik.http.routers.brigittehulliger.rule=Host(`www.brigittehulliger.ch`)'
      - 'traefik.http.routers.brigittehulliger.entrypoints=websecure'
      - 'traefik.http.routers.brigittehulliger.tls=true'
      - 'traefik.http.routers.brigittehulliger.tls.certresolver=myresolver'
      - 'traefik.http.routers.brigittehulliger.tls.domains[0].main=www.brigittehulliger.ch'
      - 'traefik.http.routers.brigittehulliger.service=breakthebox'
      - 'traefik.http.routers.brigittehulliger.middlewares=brigittehulliger-redirect'
      - 'traefik.http.middlewares.brigittehulliger-redirect.redirectregex.regex=^https?://[^/]+/(.*)'
      - 'traefik.http.middlewares.brigittehulliger-redirect.redirectregex.replacement=https://web.breakthebox.ch/$${1}'
      - 'traefik.http.middlewares.brigittehulliger-redirect.redirectregex.permanent=true'

volumes:
  pgdata:
  uploads:

networks:
  internal:
  n8n_internal:
    external: true
