# ═══════════════════════════════════════════════════════════
# Docker Compose — Production Deployment (Traefik)
# ═══════════════════════════════════════════════════════════
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml down
#   docker compose -f docker-compose.prod.yml logs -f app

services:
  # ─── PostgreSQL Database ───
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-breakthebox}
      POSTGRES_USER: ${DB_USER:-breakthebox}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-breakthebox}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── SvelteKit Application ───
  app:
    image: ghcr.io/breakthebox/breakthebox.ch:${APP_VERSION:-latest}
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-breakthebox}:${DB_PASSWORD}@db:5432/${DB_NAME:-breakthebox}
      - NODE_ENV=production
      - ORIGIN=${PUBLIC_APP_URL:-https://www.brigittehulliger.ch}
      # adapter-node begrenzt Request-Bodies auf 512 KB — hochgesetzt, damit
      # Bild-Uploads bis zur App-Grenze (5 MB, /api/upload) durchkommen.
      - BODY_SIZE_LIMIT=6M
    env_file:
      - .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - n8n_internal
    labels:
      - 'traefik.enable=true'
      # ─── App-Router — kanonische Domain www.brigittehulliger.ch ───
      - 'traefik.http.routers.breakthebox.rule=Host(`www.brigittehulliger.ch`)'
      - 'traefik.http.routers.breakthebox.entrypoints=websecure'
      - 'traefik.http.routers.breakthebox.tls=true'
      - 'traefik.http.routers.breakthebox.tls.certresolver=myresolver'
      - 'traefik.http.routers.breakthebox.tls.domains[0].main=www.brigittehulliger.ch'
      - 'traefik.http.services.breakthebox.loadbalancer.server.port=3000'
      - 'traefik.docker.network=n8n_internal'
      # ─── Redirect-Router — web.breakthebox.ch + Apex brigittehulliger.ch → kanonisch (301) ───
      # Ein SAN-Zertifikat für beide Alt-Hostnamen; die Middleware leitet um,
      # bevor die Anfrage die App erreicht (service=breakthebox nur, weil
      # Traefik einen Service verlangt). $$ escaped das $ vor Compose-Interpolation.
      - 'traefik.http.routers.btb-redirect.rule=Host(`web.breakthebox.ch`) || Host(`brigittehulliger.ch`)'
      - 'traefik.http.routers.btb-redirect.entrypoints=websecure'
      - 'traefik.http.routers.btb-redirect.tls=true'
      - 'traefik.http.routers.btb-redirect.tls.certresolver=myresolver'
      - 'traefik.http.routers.btb-redirect.tls.domains[0].main=web.breakthebox.ch'
      - 'traefik.http.routers.btb-redirect.tls.domains[0].sans=brigittehulliger.ch'
      - 'traefik.http.routers.btb-redirect.service=breakthebox'
      - 'traefik.http.routers.btb-redirect.middlewares=btb-canonical'
      - 'traefik.http.middlewares.btb-canonical.redirectregex.regex=^https?://[^/]+/(.*)'
      - 'traefik.http.middlewares.btb-canonical.redirectregex.replacement=https://www.brigittehulliger.ch/$${1}'
      - 'traefik.http.middlewares.btb-canonical.redirectregex.permanent=true'

volumes:
  pgdata:
  uploads:

networks:
  internal:
  n8n_internal:
    external: true
